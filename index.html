 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENDER TÁCTICO - MontCode™</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-6 font-sans">
    <div class="text-center mb-10">
        <h1 class="text-[#ccff00] text-3xl font-black italic tracking-tighter uppercase leading-none">SENDER TACTICAL</h1>
        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Direct Link Mode (No Encryption)</p>
    </div>

    <button id="send-btn" onclick="enviarDato('ALERTA: Emergencia Detectada')" 
        class="w-48 h-48 bg-[#ccff00] text-black font-black rounded-full border-[10px] border-[#ccff00]/20 shadow-[0_0_50px_rgba(204,255,0,0.1)] active:scale-95 transition-all flex flex-col items-center justify-center focus:outline-none mb-10">
        <span class="text-2xl italic uppercase leading-none">PULSE</span>
        <span class="text-[9px] opacity-70 mt-1 uppercase tracking-[0.1em]">Send Signal</span>
    </button>

    <div class="w-full max-w-xs space-y-3">
        <input type="text" id="chat-input" placeholder="Escribe mensaje..." 
            class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-[#ccff00] transition-all placeholder:text-zinc-700">
        <button onclick="enviarDesdeChat()" class="w-full bg-zinc-800 text-[#ccff00] font-bold py-3 rounded-xl uppercase text-[11px] tracking-widest border border-zinc-700">
            Enviar Mensaje Directo
        </button>
    </div>

    <div id="status-box" class="mt-10 p-4 rounded-2xl bg-zinc-900 border border-zinc-800 w-full max-w-xs text-center">
        <p id="status-text" class="text-zinc-600 font-bold text-[10px] uppercase tracking-widest">System Ready</p>
    </div>

    <script>
        async function enviarDato(contenido) {
            const status = document.getElementById('status-text');
            status.innerText = "SENDING...";
            status.className = "text-yellow-500 font-bold text-[10px] animate-pulse uppercase tracking-widest";

            try {
                // USAMOS EL CAMPO 'text' QUE ES EL COMPATIBLE CON TU RELAY
                const response = await fetch('/api/pusher-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: contenido, 
                        channel_id: "TEST-ID" 
                    })
                });

                if (response.ok) {
                    status.innerText = "DATA SENT ✅";
                    status.className = "text-[#ccff00] font-bold text-[10px] uppercase tracking-widest";
                }
            } catch (error) {
                status.innerText = "FAILED ❌";
                status.className = "text-red-500 font-bold text-[10px] uppercase tracking-widest";
            }
        }

        function enviarDesdeChat() {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                enviarDato(input.value);
                input.value = "";
            }
        }
    </script>
</body>
</html>
