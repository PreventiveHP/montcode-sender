 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENDER - MontCode™</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-6">
    <div class="text-center mb-10">
        <h1 class="text-[#ccff00] text-3xl font-black italic uppercase tracking-tighter">SENDER TACTICAL</h1>
        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Direct Tube Mode</p>
    </div>

    <button onclick="enviarDato('ALERTA: Emergencia detectada. Requiere atención inmediata.')" 
        class="w-48 h-48 bg-[#ccff00] text-black font-black rounded-full border-[10px] border-[#ccff00]/20 shadow-[0_0_50px_rgba(204,255,0,0.2)] active:scale-95 mb-10 uppercase italic">
        PULSE
    </button>

    <div class="w-full max-w-xs space-y-3">
        <textarea id="chat-input" placeholder="Escribe nota larga..." 
            class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-white text-sm focus:border-[#ccff00] outline-none h-24 resize-none"></textarea>
        <button onclick="enviarDesdeChat()" class="w-full bg-zinc-800 text-[#ccff00] font-bold py-3 rounded-xl uppercase text-[11px] tracking-widest border border-zinc-700">
            Enviar Reporte Largo
        </button>
    </div>

    <div id="status-box" class="mt-10 text-center">
        <p id="status-text" class="text-zinc-600 font-bold text-[10px] uppercase tracking-widest">READY</p>
    </div>

    <script>
        async function enviarDato(contenido) {
            const status = document.getElementById('status-text');
            status.innerText = "SENDING...";
            try {
                const response = await fetch('/api/pusher-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: contenido, channel_id: "TEST-ID" })
                });
                if (response.ok) {
                    status.innerText = "SENT SUCCESS ✅";
                    status.className = "text-[#ccff00] font-bold text-[10px] uppercase tracking-widest";
                }
            } catch (error) {
                status.innerText = "ERROR ❌";
            }
        }

        function enviarDesdeChat() {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                enviarDato(input.value);
                input.value = "";
            }
        }
    </script>
</body>
</html>
