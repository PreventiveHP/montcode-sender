 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENDER TEST - MontCode™</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-6 font-sans">

    <div class="text-center mb-10">
        <h1 class="text-[#ccff00] text-3xl font-black italic tracking-tighter uppercase">SENDER TEST</h1>
        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em]">Bridge Transmitter</p>
    </div>

    <button id="send-btn" onclick="enviarPrueba()" 
        class="w-64 h-64 bg-[#ccff00] text-black font-black rounded-full border-[10px] border-[#ccff00]/20 shadow-[0_0_50px_rgba(204,255,0,0.2)] active:scale-95 transition-all flex flex-col items-center justify-center focus:outline-none">
        <span class="text-4xl italic uppercase leading-none">SEND</span>
        <span class="text-[10px] opacity-70 mt-2 uppercase tracking-[0.2em]">"HOLA MUNDO"</span>
    </button>

    <div id="status-box" class="mt-12 p-4 rounded-2xl bg-zinc-900 border border-zinc-800 w-full max-w-xs text-center">
        <p id="status-text" class="text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Ready to Transmit</p>
    </div>

    <script>
        async function enviarPrueba() {
            const status = document.getElementById('status-text');
            const btn = document.getElementById('send-btn');

            // Feedback visual inmediato
            status.innerText = "TRANSMITTING...";
            status.className = "text-yellow-500 font-bold text-[10px] animate-pulse uppercase tracking-widest";
            btn.style.opacity = "0.5";

            try {
                // LLAMADA AL RELAY (Igual que en Rescue)
                const response = await fetch('/api/pusher-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: "HOLA MUNDO DESDE EL TEST",
                        channel_id: "TEST-ID" // Este es el ID que usará el Receiver
                    })
                });

                if (response.ok) {
                    status.innerText = "SENT SUCCESSFULLY ✅";
                    status.className = "text-[#ccff00] font-bold text-[10px] uppercase tracking-widest";
                } else {
                    throw new Error("Relay Error");
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                status.innerText = "CONNECTION FAILED ❌";
                status.className = "text-red-500 font-bold text-[10px] uppercase tracking-widest";
            } finally {
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
