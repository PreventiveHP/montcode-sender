<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONTCODE SENDER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen p-6" id="bg">
    <div class="text-center p-10 border-2 border-zinc-800 rounded-[3rem] bg-zinc-900/50 max-w-sm w-full shadow-2xl">
        <p id="st" class="text-zinc-600 text-[10px] font-black uppercase tracking-widest mb-4 italic">Waiting for Dr...</p>
        <p id="msg" class="text-4xl font-black italic uppercase text-zinc-800 transition-all leading-tight">OFFLINE</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG (MISMAS KEYS)
        const config = {
            apiKey: "AIzaSyDVIQ4S-w4Ag40uYuArW3o7Hw2XQwoQV7U",
            databaseURL: "https://montcode-e02c7-default-rtdb.firebaseio.com",
            projectId: "montcode-e02c7"
        };
        const app = initializeApp(config);
        const db = getDatabase(app);

        // AQUÍ PONES EL ID DEL PACIENTE DUEÑO DEL TELÉFONO
        const MI_ID = "12345"; 

        onValue(ref(db, `mensaje_dr/${MI_ID}`), (snap) => {
            const data = snap.val();
            if (data && data.texto) {
                document.getElementById('st').innerText = "NEW MEDICAL INSTRUCTION";
                document.getElementById('st').className = "text-[#ccff00] text-[10px] font-black mb-4 animate-pulse";
                document.getElementById('msg').innerText = data.texto;
                document.getElementById('msg').className = "text-4xl font-black italic uppercase text-[#ccff00]";
                document.getElementById('bg').style.backgroundColor = "#001a1a";
            }
        });
    </script>
</body>
</html>
