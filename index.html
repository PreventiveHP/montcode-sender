 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENDER - MontCode™</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-6 font-sans">
    <h1 class="text-[#ccff00] text-3xl font-black italic mb-10 uppercase tracking-tighter">Sender Tactical</h1>

    <button onclick="enviarDato('ALERTA: Pulso de emergencia activado.')" 
        class="w-48 h-48 bg-[#ccff00] text-black font-black rounded-full border-[10px] border-[#ccff00]/20 shadow-[0_0_50px_rgba(204,255,0,0.3)] active:scale-95 mb-10 uppercase italic">
        PULSE
    </button>

    <div class="w-full max-w-xs space-y-3">
        <textarea id="chat-input" placeholder="Escribe reporte largo..." 
            class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-white text-sm focus:border-[#ccff00] outline-none h-24 resize-none"></textarea>
        <button onclick="enviarDesdeChat()" class="w-full bg-zinc-800 text-[#ccff00] font-bold py-3 rounded-xl uppercase text-[11px] tracking-widest border border-zinc-700">
            Transmitir Datos
        </button>
    </div>

    <p id="status-text" class="mt-10 text-zinc-600 font-bold text-[10px] uppercase tracking-widest">Ready</p>

    <script>
        async function enviarDato(contenido) {
            const status = document.getElementById('status-text');
            status.innerText = "TRANSMITTING...";
            status.className = "mt-10 text-yellow-500 font-bold text-[10px] uppercase tracking-widest animate-pulse";

            try {
                // EL FETCH APUNTA AL RELAY QUE DISPARA 'test-event'
                const response = await fetch('/api/pusher-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // IMPORTANTE: Enviamos 'message' porque es lo que lee tu archivo de Node.js
                    body: JSON.stringify({ message: contenido }) 
                });

                if (response.ok) {
                    status.innerText = "SENT SUCCESS ✅";
                    status.className = "mt-10 text-[#ccff00] font-bold text-[10px] uppercase tracking-widest";
                } else {
                    status.innerText = "RELAY ERROR ⚠️";
                    status.className = "mt-10 text-red-500 font-bold text-[10px] uppercase tracking-widest";
                }
            } catch (error) {
                status.innerText = "NETWORK FAILED ❌";
                status.className = "mt-10 text-red-700 font-bold text-[10px] uppercase tracking-widest";
            }
        }

        function enviarDesdeChat() {
            const input = document.getElementById('chat-input');
            if (input.value.trim()) {
                enviarDato(input.value);
                input.value = "";
            }
        }
    </script>
</body>
</html>
