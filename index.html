 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PATIENT TERMINAL - MontCode™</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-cyan { box-shadow: 0 0 25px rgba(0, 255, 255, 0.2); }
        .med-alert { background: linear-gradient(145deg, #1a1a1a, #002222); border: 2px solid #00ffff !important; }
        .pill-bounce { animation: bounce 2s infinite; font-size: 50px; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-black text-white flex flex-col items-center min-h-screen p-6 font-sans">

    <div class="w-full max-w-xs mb-8">
        <label class="text-[10px] text-[#00ffff] uppercase tracking-[0.2em] block mb-3 font-black italic text-center">
            Secured Instruction Node
        </label>
        
        <div id="feedback-panel" class="w-full bg-zinc-900 border-2 border-zinc-800 p-6 rounded-[2.5rem] glow-cyan transition-all min-h-[160px] flex flex-col justify-center items-center relative overflow-hidden text-center">
            
            <div id="feedback-placeholder" class="text-zinc-700 text-[10px] uppercase font-bold tracking-widest">
                <div class="mb-2 opacity-20">📡</div>
                Waiting for Dr. Commands
            </div>

            <div id="feedback-active" class="hidden w-full">
                <div id="pill-zone" class="hidden mb-2 pill-bounce">💊</div>
                <span id="feedback-label" class="text-[9px] text-[#00ffff] uppercase font-black block mb-1 tracking-widest italic underline decoration-[#ccff00]">Message from Dr:</span>
                <p id="feedback-content" class="text-xl text-white font-black leading-tight uppercase italic"></p>
                
                <button onclick="dismissFeedback()" class="mt-6 bg-white/5 px-4 py-2 rounded-full text-[8px] text-zinc-500 font-bold uppercase tracking-widest hover:text-white transition-colors border border-white/10">
                    Confirm & Clear
                </button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-xs border-t border-zinc-800/50 mb-8"></div>

    <div class="text-center mb-6">
        <div class="flex items-center justify-center gap-2 mb-1">
            <h1 class="text-[#ccff00] text-xl font-black italic tracking-tighter uppercase leading-none">Vital Logger</h1>
            <div id="conn-indicator" class="w-2 h-2 rounded-full bg-red-600 shadow-[0_0_8px_red]"></div>
        </div>
        <p class="text-zinc-600 text-[8px] font-bold uppercase tracking-[0.3em]">Patient-to-Provider Link</p>
    </div>

    <div class="w-full max-w-xs space-y-4">
        <div class="bg-zinc-900/40 border border-zinc-800 p-4 rounded-3xl">
            <div class="flex gap-2 mb-2">
                <input type="number" id="bp-sys" placeholder="SYS" class="w-1/2 bg-black border border-zinc-800 rounded-xl p-3 text-center text-[#00ffff] font-black outline-none focus:border-[#00ffff]">
                <input type="number" id="bp-dia" placeholder="DIA" class="w-1/2 bg-black border border-zinc-800 rounded-xl p-3 text-center text-[#00ffff] font-black outline-none focus:border-[#00ffff]">
            </div>
            <button onclick="prepararEnvioBP()" class="w-full bg-zinc-800 text-white font-black py-3 rounded-xl uppercase text-[9px] tracking-widest mb-4 hover:bg-zinc-700">Push BP Record</button>
            
            <input type="number" id="glu-val" placeholder="GLUCOSE mg/dL" class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-center text-[#ccff00] font-black outline-none focus:border-[#ccff00] mb-2">
            <button onclick="prepararEnvioGLU()" class="w-full bg-zinc-800 text-white font-black py-3 rounded-xl uppercase text-[9px] tracking-widest hover:bg-zinc-700">Push Glucose Record</button>
        </div>

        <div class="pt-2">
            <input type="text" id="chat-input" placeholder="Type a note for your Dr..." class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-white text-sm focus:outline-none focus:border-[#ccff00] placeholder:text-zinc-700 mb-2 font-bold">
            <button onclick="enviarDesdeChat()" class="w-full bg-[#ccff00] text-black font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest shadow-lg shadow-[#ccff00]/10 active:scale-95 transition-all">
                Send Note to Station
            </button>
        </div>

        <div id="status-box" class="text-center py-4">
            <p id="status-text" class="text-zinc-800 font-bold text-[8px] uppercase tracking-widest italic">Link: Idle</p>
        </div>
    </div>

    <script>
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
        const channel = pusher.subscribe("test-channel");

        pusher.connection.bind('connected', () => {
            document.getElementById('conn-indicator').className = "w-2 h-2 rounded-full bg-[#ccff00] shadow-[0_0_8px_#ccff00]";
        });

        // --- RECEPTOR LÓGICO (ESCUCHA AL DR) ---
        channel.bind('test-event', function(data) {
            const content = data.text || data.message || "";
            if (!content) return;

            // FILTRO: Solo mostrar si viene del Dr (CMD:FEEDBACK)
            if (content.includes("CMD:FEEDBACK")) {
                const msg = content.split('|MSG:')[1] || "Check instructions";
                
                // DETECCIÓN DE CÁPSULA (Basado en Losartan o mg)
                const isMed = msg.toLowerCase().includes('losartan') || msg.toLowerCase().includes('mg');
                
                showFeedback(msg, isMed);
            }
        });

        function showFeedback(msg, isMed) {
            document.getElementById('feedback-placeholder').classList.add('hidden');
            document.getElementById('feedback-active').classList.remove('hidden');
            
            const panel = document.getElementById('feedback-panel');
            const pill = document.getElementById('pill-zone');
            
            if (isMed) {
                panel.classList.add('med-alert');
                pill.classList.remove('hidden');
            } else {
                panel.classList.remove('med-alert');
                pill.classList.add('hidden');
            }

            document.getElementById('feedback-content').innerText = msg;
            if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
        }

        function dismissFeedback() {
            document.getElementById('feedback-placeholder').classList.remove('hidden');
            document.getElementById('feedback-active').classList.add('hidden');
            document.getElementById('feedback-panel').classList.remove('med-alert');
        }

        // --- TRANSMISIÓN HACIA EL DR ---
        async function enviarDato(contenido) {
            const status = document.getElementById('status-text');
            status.innerText = "LINKING...";
            
            try {
                // Usamos la misma API de relay que configuramos
                await fetch('https://api.pusher.com/apps/1897282/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: "test-event",
                        channel: "test-channel",
                        data: { text: contenido }
                    })
                });
                status.innerText = "SENT TO DR ✅";
            } catch (e) {
                status.innerText = "LINK ERROR ❌";
            }
        }

        function prepararEnvioBP() {
            const s = document.getElementById('bp-sys').value;
            const d = document.getElementById('bp-dia').value;
            if (s && d) { enviarDato(`CMD:BP|SYS:${s}|DIA:${d}`); document.getElementById('bp-sys').value = ""; document.getElementById('bp-dia').value = ""; }
        }

        function prepararEnvioGLU() {
            const g = document.getElementById('glu-val').value;
            if (g) { enviarDato(`CMD:GLU|VAL:${g}`); document.getElementById('glu-val').value = ""; }
        }

        function enviarDesdeChat() {
            const i = document.getElementById('chat-input');
            if (i.value.trim()) { enviarDato(i.value); i.value = ""; }
        }
    </script>
</body>
</html>
