 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENDER TEST - MontCode™</title>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-cyan { box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); }
        .alert-pulse { animation: pulse-border 2s infinite; }
        @keyframes pulse-border {
            0% { border-color: #333; }
            50% { border-color: #00ffff; }
            100% { border-color: #333; }
        }
    </style>
</head>
<body class="bg-black text-white flex flex-col items-center min-h-screen p-6 font-sans">

    <div class="w-full max-w-xs mb-8">
        <label class="text-[10px] text-[#00ffff] uppercase tracking-[0.2em] block mb-3 font-black italic text-center">
            Instruction Receiver Terminal
        </label>
        
        <div id="feedback-panel" class="w-full bg-zinc-900 border-2 border-zinc-800 p-5 rounded-3xl glow-cyan transition-all min-h-[120px] flex flex-col justify-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-zinc-800"></div>
            
            <div id="feedback-placeholder" class="text-zinc-600 text-[10px] uppercase text-center font-bold tracking-widest leading-tight">
                No active instructions<br><span class="opacity-50 text-[8px]">Waiting for Provider...</span>
            </div>

            <div id="feedback-active" class="hidden">
                <span class="text-[9px] text-[#00ffff] uppercase font-black block mb-2 tracking-widest underline decoration-2 offset-4">Incoming Message:</span>
                <p id="feedback-content" class="text-lg text-white font-black italic leading-tight uppercase"></p>
                <button onclick="dismissFeedback()" class="mt-4 text-[9px] text-zinc-500 font-bold uppercase tracking-widest hover:text-white transition-colors">× Clear Terminal</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-xs border-t border-zinc-800 mb-8 opacity-30"></div>

    <div class="text-center mb-6">
        <div class="flex items-center justify-center gap-2 mb-1">
            <h1 class="text-[#ccff00] text-xl font-black italic tracking-tighter uppercase">Patient Transmitter</h1>
            <div id="conn-indicator" class="w-2 h-2 rounded-full bg-red-600 shadow-[0_0_8px_red]"></div>
        </div>
        <p class="text-zinc-600 text-[8px] font-bold uppercase tracking-[0.4em]">Secure Link v2.4</p>
    </div>

    <div class="w-full max-w-xs space-y-4">
        <div class="flex justify-center py-2">
            <button id="send-btn" onclick="enviarDato('PULSE ALERT')" 
                class="w-28 h-28 bg-[#ccff00] text-black font-black rounded-full border-[6px] border-[#ccff00]/20 shadow-[0_0_30px_rgba(204,255,0,0.1)] active:scale-90 transition-all flex items-center justify-center">
                <span class="text-lg font-black italic">PULSE</span>
            </button>
        </div>

        <div class="bg-zinc-900/40 border border-zinc-800 p-4 rounded-2xl">
            <div class="flex gap-2 mb-2">
                <input type="number" id="bp-sys" placeholder="SYS" class="w-1/2 bg-black border border-zinc-800 rounded-xl p-3 text-center text-[#ccff00] font-bold outline-none focus:border-[#ccff00]">
                <input type="number" id="bp-dia" placeholder="DIA" class="w-1/2 bg-black border border-zinc-800 rounded-xl p-3 text-center text-[#ccff00] font-bold outline-none focus:border-[#ccff00]">
            </div>
            <button onclick="prepararEnvioBP()" class="w-full bg-[#ccff00] text-black font-black py-2.5 rounded-xl uppercase text-[9px] tracking-widest mb-4">Log Pressure</button>
            
            <input type="number" id="glu-val" placeholder="GLUCOSE mg/dL" class="w-full bg-black border border-zinc-800 rounded-xl p-3 text-center text-[#ccff00] font-bold outline-none focus:border-[#ccff00] mb-2">
            <button onclick="prepararEnvioGLU()" class="w-full bg-[#ccff00] text-black font-black py-2.5 rounded-xl uppercase text-[9px] tracking-widest">Log Glucose</button>
        </div>

        <div class="pt-2">
            <input type="text" id="chat-input" placeholder="Type note for Dr..." class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-[#ccff00] placeholder:text-zinc-700 mb-2">
            <button onclick="enviarDesdeChat()" class="w-full bg-zinc-800 text-[#ccff00] font-black py-3 rounded-xl uppercase text-[10px] tracking-widest border border-zinc-700">Transmit Note</button>
        </div>

        <div id="status-box" class="text-center py-4">
            <p id="status-text" class="text-zinc-700 font-bold text-[9px] uppercase tracking-widest italic">Link: Standby</p>
        </div>
    </div>

    <script>
        const pusher = new Pusher('284fc98940a4b6d4c359', { cluster: 'us2' });
        const channel = pusher.subscribe("test-channel");

        pusher.connection.bind('connected', () => {
            document.getElementById('conn-indicator').className = "w-2 h-2 rounded-full bg-[#ccff00] shadow-[0_0_8px_#ccff00]";
        });

        // --- RECEPTOR DE INSTRUCCIONES (DEL DR AL PACIENTE) ---
        channel.bind('test-event', function(data) {
            const content = data.text || data.message || "";
            
            // Si el contenido trae el prefijo de Feedback del Dr.
            if (content.includes("CMD:FEEDBACK")) {
                const parts = content.split('|MSG:');
                if (parts.length > 1) {
                    showFeedback(parts[1]);
                }
            }
        });

        function showFeedback(msg) {
            document.getElementById('feedback-placeholder').classList.add('hidden');
            document.getElementById('feedback-active').classList.remove('hidden');
            document.getElementById('feedback-panel').classList.add('alert-pulse', 'border-[#00ffff]');
            document.getElementById('feedback-content').innerText = msg;
            
            // Vibración táctica: [largo, corto, largo]
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }

        function dismissFeedback() {
            document.getElementById('feedback-placeholder').classList.remove('hidden');
            document.getElementById('feedback-active').classList.add('hidden');
            document.getElementById('feedback-panel').classList.remove('alert-pulse', 'border-[#00ffff]');
        }

        // --- TRANSMISOR DE DATOS (PACIENTE AL DR) ---
        async function enviarDato(contenido) {
            const status = document.getElementById('status-text');
            status.innerText = "TRANSMITTING...";
            status.className = "text-yellow-500 font-bold text-[9px] animate-pulse uppercase tracking-widest";
            
            try {
                // Tu relay API que conecta con Pusher
                const response = await fetch('/api/pusher-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: contenido, channel_id: "TEST-ID" })
                });

                if (response.ok) {
                    status.innerText = "SUCCESS ✅";
                    status.className = "text-[#ccff00] font-bold text-[9px] uppercase tracking-widest";
                }
            } catch (e) {
                status.innerText = "FAILED ❌";
                status.className = "text-red-500 font-bold text-[9px] uppercase tracking-widest";
            }
        }

        function prepararEnvioBP() {
            const s = document.getElementById('bp-sys').value;
            const d = document.getElementById('bp-dia').value;
            if (s && d) { 
                enviarDato(`CMD:BP|SYS:${s}|DIA:${d}`); 
                document.getElementById('bp-sys').value = ""; 
                document.getElementById('bp-dia').value = ""; 
            }
        }

        function prepararEnvioGLU() {
            const g = document.getElementById('glu-val').value;
            if (g) { 
                enviarDato(`CMD:GLU|VAL:${g}`); 
                document.getElementById('glu-val').value = ""; 
            }
        }

        function enviarDesdeChat() {
            const i = document.getElementById('chat-input');
            if (i.value.trim()) { 
                enviarDato(i.value); 
                i.value = ""; 
            }
        }
    </script>
</body>
</html>
